{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<section class="section">
  <div class="container">
    <p class="eyebrow">{{ page.hero_eyebrow }}</p>
    <h1>{{ page.title }}</h1>

    {% if page.thank_you_text %}
    <div class="form-intro">
      {{ page.thank_you_text|richtext }}
    </div>
    {% endif %}
  </div>
</section>
{% endblock %}
