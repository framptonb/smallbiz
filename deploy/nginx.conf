server {
    listen 80;
    server_name 3.90.137.42;

    location = /favicon.ico { access_log off; log_not_found off; }

    location /static/ {
        alias /home/ubuntu/sites/smallbiz/staticfiles/;
    }

    location /media/ {
        root /home/ubuntu/sites/smallbiz;
    }

    location / {
        include proxy_params;
        proxy_pass http://unix:/run/gunicorn/gunicorn.sock;
    }
}
