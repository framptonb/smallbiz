{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<div class="container">
  <h1>{{ page.title }}</h1>

  {% if page.intro %}
    <div>{{ page.intro|richtext }}</div>
  {% endif %}

  {% if page.body %}
    <div>{{ page.body|richtext }}</div>
  {% endif %}
</div>
{% endblock %}
