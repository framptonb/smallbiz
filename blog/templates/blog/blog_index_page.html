{% extends "base.html" %}
{% load wagtailcore_tags %}

{% block content %}
<h1>{{ page.title }}</h1>

<div>
  {{ page.intro|richtext }}
</div>

<hr>

<h2>Latest Posts</h2>

<ul>
  {% for post in page.get_children.live %}
    <li>
      <a href="{{ post.url }}">{{ post.title }}</a>
    </li>
  {% empty %}
    <li>No blog posts yet.</li>
  {% endfor %}
</ul>
{% endblock %}
