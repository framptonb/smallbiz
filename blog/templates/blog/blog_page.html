{% extends "base.html" %}
{% load wagtailcore_tags wagtailimages_tags %}

{% block content %}
<h1>{{ page.title }}</h1>

{% if page.image %}
  {% image page.image fill-800x400 %}
{% endif %}

<p><em>{{ page.date }}</em></p>
<p><strong>{{ page.intro }}</strong></p>

<div>
  {{ page.body|richtext }}
</div>

<p><a href="/blog/">← Back to Blog</a></p>
{% endblock %}
